version: "3.9"

x-common-env: &common-env
  env_file: .env
  environment:
    - POSTGRES_HOST=postgres
    - REDIS_URL=redis://redis:6379/0
    - REDIS_QUEUE_URL=redis://redis:6379/1
    - NEO4J_URI=bolt://neo4j:7687

services:
  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── ARQ Worker ───────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: python -m app.ingestion.queue.worker
    restart: unless-stopped
    deploy:
      replicas: 2

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: opsgraph
      POSTGRES_USER: opsgraph
      POSTGRES_PASSWORD: opsgraph_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsgraph -d opsgraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j (optional graph layer) ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    profiles:
      - neo4j

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
